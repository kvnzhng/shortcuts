<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shortcut Finder</title>
    <style>
:root {
  color-scheme: light;
  --desktop: #008080;
  --window: #c0c0c0;
  --window-light: #ffffff;
  --window-mid: #dfdfdf;
  --window-dark: #808080;
  --window-darker: #404040;
  --title: #000080;
  --title-soft: #1084d0;
  --text: #000000;
  --muted: #202020;
  --link: #0000ee;
  --visited: #551a8b;
  --focus: #ffff00;
  --green-soft: #b8e0c2;
  --blue-soft: #c6d7ff;
  --gold-soft: #fff0a8;
  --red-soft: #ffc0c0;
  --red: #800000;
  --ink: #000000;
  --blue: #000080;
  --shadow: none;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 15px;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  background-color: var(--desktop);
  background-image:
    linear-gradient(45deg, rgba(255, 255, 255, 0.08) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255, 255, 255, 0.08) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(0, 0, 0, 0.08) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(0, 0, 0, 0.08) 75%);
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  background-size: 16px 16px;
  color: var(--text);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  width: min(1180px, calc(100% - 24px));
  margin: 0 auto;
  padding: 14px 0 28px;
}

.page-header,
.filter-bar,
.app-tabs,
.results-panel {
  border-color: var(--window-light) var(--window-darker) var(--window-darker) var(--window-light);
  border-style: solid;
  border-width: 2px;
  background: var(--window);
  box-shadow: 2px 2px 0 #000000;
}

.page-header {
  position: relative;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 12px;
  min-height: 106px;
  margin-bottom: 10px;
  padding: 34px 10px 10px;
}

.page-header::before,
.results-panel::before,
.filter-bar::before,
.app-tabs::before {
  content: "Shortcut Finder 95";
  position: absolute;
  top: 3px;
  right: 3px;
  left: 3px;
  height: 22px;
  padding: 2px 8px;
  background: linear-gradient(90deg, var(--title), var(--title-soft));
  color: #ffffff;
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 18px;
  text-shadow: 1px 1px 0 #000000;
}

.filter-bar::before {
  content: "Find";
}

.app-tabs::before {
  content: "Applications";
}

.results-panel::before {
  content: "Results";
}

.brand-block {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.brand-mark {
  display: grid;
  flex: 0 0 auto;
  grid-template-columns: repeat(2, 18px);
  grid-template-rows: repeat(2, 18px);
  gap: 3px;
  padding: 6px;
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  border-style: solid;
  border-width: 2px;
  background: var(--window-mid);
}

.brand-mark span {
  border: 1px solid #000000;
}

.brand-mark span:nth-child(1) {
  background: #ff0000;
}

.brand-mark span:nth-child(2) {
  background: #00aa00;
}

.brand-mark span:nth-child(3) {
  background: #ffff00;
}

.brand-mark span:nth-child(4) {
  background: #0000ff;
}

h1,
h2,
h3,
p {
  margin: 0;
}

h1 {
  color: #000080;
  font-family: "Arial Black", Impact, Arial, sans-serif;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: 0;
  text-shadow: 1px 1px 0 #ffffff;
}

.brand-block p,
.results-heading p {
  margin-top: 6px;
  color: var(--muted);
  font-family: "Courier New", monospace;
  font-size: 0.92rem;
}

.keyboard-preview {
  display: grid;
  align-self: center;
  grid-template-columns: repeat(5, minmax(38px, 1fr));
  gap: 4px;
  width: min(330px, 34vw);
  min-width: 230px;
  padding: 7px;
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  border-style: solid;
  border-width: 2px;
  background: #808080;
}

.preview-key,
kbd {
  border-color: var(--window-light) var(--window-darker) var(--window-darker) var(--window-light);
  border-style: solid;
  border-width: 2px;
  background: var(--window-mid);
  color: #000000;
  font-family: "Courier New", monospace;
  font-weight: 700;
}

.preview-key {
  display: grid;
  min-height: 36px;
  place-items: center;
  font-size: 0.82rem;
}

.filter-bar {
  position: relative;
  display: grid;
  grid-template-columns: minmax(280px, 0.8fr) minmax(280px, 1.2fr);
  gap: 10px;
  align-items: end;
  margin-bottom: 10px;
  padding: 34px 10px 10px;
}

.filter-group {
  display: grid;
  gap: 6px;
}

.filter-label {
  color: #000000;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

.segmented-control {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 4px;
  padding: 4px;
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  border-style: solid;
  border-width: 2px;
  background: var(--window-mid);
}

.segmented-control button,
.app-tab,
.clear-button {
  border-color: var(--window-light) var(--window-darker) var(--window-darker) var(--window-light);
  border-style: solid;
  border-width: 2px;
  border-radius: 0;
  color: #000000;
  background: var(--window);
}

.segmented-control button {
  min-height: 34px;
  padding: 0 8px;
  font-size: 0.9rem;
  font-weight: 700;
  white-space: nowrap;
}

.segmented-control button[aria-pressed="true"],
.app-tab[aria-selected="true"] {
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  background: #000080;
  color: #ffffff;
}

.search-field {
  position: relative;
  display: flex;
  align-items: center;
  min-height: 48px;
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  border-style: solid;
  border-width: 2px;
  background: #ffffff;
}

.search-glyph {
  position: relative;
  flex: 0 0 40px;
  width: 40px;
  height: 40px;
}

.search-glyph::before {
  content: "?";
  position: absolute;
  top: 8px;
  left: 10px;
  width: 22px;
  height: 22px;
  border: 1px solid #000000;
  background: #ffff00;
  color: #000000;
  font-family: "Courier New", monospace;
  font-weight: 700;
  line-height: 22px;
  text-align: center;
}

.search-glyph::after {
  content: none;
}

.search-field input {
  width: 100%;
  min-width: 0;
  border: 0;
  outline: 0;
  background: transparent;
  color: #000000;
  font-family: "Courier New", monospace;
  font-size: 1rem;
}

.search-field:focus-within {
  outline: 2px dotted #000000;
  outline-offset: 2px;
}

.clear-button {
  display: none;
  margin-right: 6px;
  padding: 6px 10px;
  color: #000000;
  font-size: 0.86rem;
  font-weight: 700;
}

.clear-button.is-visible {
  display: block;
}

.clear-button:hover,
.segmented-control button:hover,
.app-tab:hover {
  background: #ffffcc;
}

.app-tabs {
  position: relative;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  margin: 0 0 10px;
  padding: 34px 10px 10px;
}

.app-tab {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-height: 42px;
  padding: 8px 10px;
  text-align: left;
}

.app-tab::before {
  content: "";
  flex: 0 0 10px;
  width: 10px;
  height: 10px;
  border: 1px solid #000000;
  background: var(--tab-color, #000080);
}

.tab-name {
  overflow: hidden;
  font-weight: 700;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tab-count {
  flex: 0 0 auto;
  min-width: 28px;
  padding: 2px 6px;
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  border-style: solid;
  border-width: 2px;
  background: #ffffff;
  color: #000000;
  font-family: "Courier New", monospace;
  font-size: 0.78rem;
  font-weight: 700;
  text-align: center;
}

.results-panel {
  position: relative;
  overflow: hidden;
  padding-top: 25px;
}

.results-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 10px;
  border-color: var(--window-darker) var(--window-light) var(--window-light) var(--window-darker);
  border-style: solid;
  border-width: 2px;
  background: #ffffcc;
}

.results-heading h2 {
  color: #800000;
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.35rem;
  letter-spacing: 0;
}

.active-filters {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 5px;
}

.filter-chip,
.device-chip,
.category-chip {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 2px 7px;
  border: 1px solid #000000;
  border-radius: 0;
  font-family: "Courier New", monospace;
  font-size: 0.76rem;
  font-weight: 700;
  white-space: nowrap;
}

.filter-chip {
  background: #ffffff;
  color: #000000;
}

.shortcut-list {
  display: grid;
  border-top: 2px solid var(--window-darker);
}

.category-group + .category-group {
  border-top: 3px double #000000;
}

.category-title {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border-bottom: 1px solid #000000;
  background: #000000;
  color: #ffff00;
  font-family: "Courier New", monospace;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

.category-dot {
  width: 10px;
  height: 10px;
  border: 1px solid #ffffff;
  background: var(--category-color, #000080);
}

.shortcut-row {
  display: grid;
  grid-template-columns: minmax(190px, 1fr) minmax(240px, 0.9fr) minmax(150px, auto);
  gap: 10px;
  align-items: center;
  padding: 8px 10px;
  border-top: 1px solid #808080;
  background: #ffffff;
}

.shortcut-row:nth-child(odd) {
  background: #eeeeee;
}

.shortcut-row:hover {
  background: #ffffcc;
  outline: 1px dotted #000000;
  outline-offset: -3px;
}

.shortcut-main {
  min-width: 0;
}

.shortcut-action {
  color: #000080;
  font-size: 0.98rem;
  font-weight: 700;
  text-decoration: underline;
}

.shortcut-description {
  margin-top: 3px;
  color: #202020;
  font-size: 0.84rem;
  line-height: 1.25;
}

.shortcut-keys {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}

.shortcut-keys > span,
.alternate-key {
  display: inline-flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
}

.shortcut-alternates {
  display: flex;
  flex: 0 0 100%;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  margin-top: 3px;
}

.alternate-label {
  color: #800000;
  font-family: "Courier New", monospace;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
}

.alternate-key kbd {
  padding: 3px 6px;
  font-size: 0.74rem;
}

kbd {
  max-width: 250px;
  min-width: 31px;
  padding: 4px 7px;
  font-size: 0.82rem;
  line-height: 1.2;
  overflow-wrap: anywhere;
  text-align: center;
}

.key-plus {
  color: #000000;
  font-family: "Courier New", monospace;
  font-size: 0.78rem;
  font-weight: 700;
}

.shortcut-meta {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  gap: 4px;
}

.device-chip {
  background: #dddddd;
  color: #000000;
}

.device-chip.device-mac {
  background: var(--green-soft);
}

.device-chip.device-windows {
  background: var(--blue-soft);
}

.device-chip.device-linux {
  background: var(--gold-soft);
}

.category-chip {
  background: var(--red-soft);
  color: var(--red);
}

.empty-state {
  padding: 42px 18px;
  background: #ffffff;
  text-align: center;
}

.empty-state h3 {
  color: #800000;
  font-size: 1.15rem;
}

.empty-state p {
  margin-top: 8px;
  color: #202020;
}

@media (max-width: 900px) {
  .page-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .keyboard-preview {
    width: 100%;
    min-width: 0;
  }

  .filter-bar {
    grid-template-columns: 1fr;
  }

  .app-tabs {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .shortcut-row {
    grid-template-columns: 1fr;
  }

  .shortcut-keys,
  .shortcut-meta {
    justify-content: flex-start;
  }

  .shortcut-keys > span,
  .shortcut-alternates,
  .alternate-key {
    justify-content: flex-start;
  }
}

@media (max-width: 560px) {
  .app-shell {
    width: min(100% - 14px, 1180px);
    padding-top: 8px;
  }

  .brand-block {
    align-items: flex-start;
  }

  .brand-mark {
    grid-template-columns: repeat(2, 14px);
    grid-template-rows: repeat(2, 14px);
    padding: 6px;
  }

  h1 {
    font-size: 1.55rem;
  }

  .segmented-control {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .search-field {
    min-height: 46px;
  }

  .app-tabs {
    grid-template-columns: 1fr;
  }

  .results-heading {
    flex-direction: column;
  }

  .active-filters {
    justify-content: flex-start;
  }
}
</style>
  </head>

    <main class="app-shell">
      <header class="page-header">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>Shortcut Finder</h1>
            <p id="librarySummary">Loading shortcuts</p>

        <div class="keyboard-preview" id="keyboardPreview" aria-hidden="true"></div>

      <section class="filter-bar" aria-label="Shortcut filters">

        <label class="search-field" for="shortcutSearch">
          <span class="search-glyph" aria-hidden="true"></span>
          <input id="shortcutSearch" type="search" autocomplete="off" placeholder="Search actions, keys, categories">
          <button class="clear-button" id="clearSearch" type="button" aria-label="Clear search">Clear</button>

      <nav class="app-tabs" id="appTabs" role="tablist" aria-label="Applications"></nav>

      <section class="results-panel" aria-live="polite">
        <div class="results-heading">
          <div>
            <h2 id="activeAppTitle">Windows 11</h2>
            <p id="resultCount">0 shortcuts</p>
          </div>
          <div class="active-filters" id="activeFilters" aria-label="Active filters"></div>
        </div>

        <div class="shortcut-list" id="shortcutList"></div>
        <div class="empty-state" id="emptyState" hidden>
          <h3>No shortcuts found</h3>
          <p>Try another device, app, or search term.</p>
        </div>
      </section>
    </main>

function expandedDevices(value) {
  if (Array.isArray(value)) {
    return value;
  }

  return String(value)
    .split(/\s+/)
    .map((device) => device.trim())
    .filter(Boolean);
}

function expandedKeys(value) {
  if (Array.isArray(value)) {
    return value;
  }

  return String(value)
    .split(/\s*\+\s*/)
    .map((key) => key.trim())
    .filter(Boolean);
}

function expandedRow(devices, category, action, keys, description = "", tags = [], alternates = []) {
  const appTags = Array.isArray(tags) ? tags : [tags];
  return {
    devices: expandedDevices(devices),
    category,
    action,
    keys: expandedKeys(keys),
    alternates: alternates.map(expandedKeys),
    description: description || `${action}.`,
    tags: [
      ...category.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean),
      ...action.toLowerCase().split(/[^a-z0-9]+/).filter(Boolean),
      ...appTags
    ]
  };
}

function expandedPair(category, action, windowsKeys, macKeys, description = "", tags = []) {
  return [
    expandedRow("windows", category, action, windowsKeys, description, tags),
    expandedRow("mac", category, action, macKeys, description, tags)
  ];
}

function expandedWinLinuxMac(category, action, windowsLinuxKeys, macKeys, description = "", tags = []) {
  return [
    expandedRow("windows linux", category, action, windowsLinuxKeys, description, tags),
    expandedRow("mac", category, action, macKeys, description, tags)
  ];
}

function expandedSame(category, action, keys, description = "", tags = []) {
  return expandedRow("windows mac", category, action, keys, description, tags);
}

let apps = [];
let shortcuts = [];

const devices = [
  { id: "all", label: "All devices" },
  { id: "mac", label: "Mac" },
  { id: "windows", label: "Windows" },
  { id: "linux", label: "Linux" }
];

const deviceLabels = {
  mac: "Mac",
  windows: "Windows",
  linux: "Linux"
};

const categoryColors = {
  System: "#2563eb",
  Windows: "#2563eb",
  Navigation: "#0f766e",
  Editing: "#b42318",
  Files: "#a15c07",
  Browser: "#7c3aed",
  Workbook: "#107c41",
  Worksheet: "#0f766e",
  Formatting: "#b42318",
  Data: "#a15c07",
  Collaboration: "#7c3aed",
  "Common Actions": "#2563eb",
  Menus: "#7c3aed",
  "Rows and Columns": "#a15c07",
  Formulas: "#0f766e",
  Accessibility: "#b42318",
  Comments: "#b42318",
  "Frequently Used": "#2563eb",
  "Ribbon Tabs": "#7c3aed",
  "Ribbon Navigation": "#7c3aed",
  "Paste Special": "#a15c07",
  "Selection and Actions": "#0f766e",
  "Data and Formulas": "#107c41",
  "External Data": "#2563eb",
  "Power Pivot": "#107c41",
  "Function Keys": "#b42318",
  "Other Keys": "#667085",
  "Windows and Dialogs": "#7c3aed",
  "Data Entry": "#a15c07",
  "Formula Bar": "#0f766e",
  Selection: "#0f766e",
  Charts: "#2563eb",
  "Sort, Filter, and PivotTables": "#107c41",
  Outline: "#a15c07",
  Drawing: "#667085",
  "Web Ribbon Tabs": "#7c3aed",
  "Web Ribbon Navigation": "#7c3aed",
  "Web Editing": "#b42318",
  "Web Data Entry": "#a15c07",
  "Web Cell Editing": "#b42318",
  "Web Navigation": "#0f766e",
  "Web Objects": "#667085",
  "Web Cells and Objects": "#107c41",
  "Web Selection Movement": "#0f766e",
  "Web Calculation": "#107c41",
  "Web Accessibility": "#b42318"
};

const state = {
  activeApp: restore("shortcut-active-app") || pickDefaultApp(),
  device: restore("shortcut-device") || "all",
  search: ""
};

const elements = {
  activeAppTitle: document.querySelector("#activeAppTitle"),
  activeFilters: document.querySelector("#activeFilters"),
  appTabs: document.querySelector("#appTabs"),
  clearSearch: document.querySelector("#clearSearch"),
  deviceFilter: document.querySelector("#deviceFilter"),
  emptyState: document.querySelector("#emptyState"),
  keyboardPreview: document.querySelector("#keyboardPreview"),
  librarySummary: document.querySelector("#librarySummary"),
  resultCount: document.querySelector("#resultCount"),
  search: document.querySelector("#shortcutSearch"),
  shortcutList: document.querySelector("#shortcutList")
};

renderStaticControls();
loadShortcutLibrary();

elements.search.addEventListener("input", (event) => {
  state.search = event.target.value;
  render();
});

elements.clearSearch.addEventListener("click", () => {
  state.search = "";
  elements.search.value = "";
  elements.search.focus();
  render();
});

async function loadShortcutLibrary() {
  renderDeviceFilter();
  renderKeyboardPreview();
  elements.librarySummary.textContent = "Loading shortcuts";

  try {
    apps = SHORTCUT_LIBRARY.apps || [];

    shortcuts = apps.flatMap((app) => {
      const library = SHORTCUT_LIBRARY.libraries[app.id] || { shortcuts: [] };
      const appId = library.app || app.id;
      return (library.shortcuts || []).map((item) => normalizeShortcut(item, appId));
    });
    shortcuts = dedupeShortcuts(shortcuts);

    if (!apps.some((app) => app.id === state.activeApp)) {
      state.activeApp = apps.some((app) => app.id === pickDefaultApp()) ? pickDefaultApp() : apps[0]?.id;
    }

    render();
  } catch (error) {
    renderLoadError(error);
  }
}


function normalizeShortcut(item, appId) {
  return {
    app: item.app || appId,
    devices: item.devices || [],
    category: item.category || "Shortcuts",
    action: item.action || "Untitled shortcut",
    keys: item.keys || [],
    alternates: item.alternates || [],
    description: item.description || "",
    tags: item.tags || []
  };
}

function dedupeShortcuts(items) {
  const seen = new Set();
  return items.filter((item) => {
    const key = [
      item.app,
      [...item.devices].sort().join(","),
      normalize(item.action),
      item.keys.map(normalize).join("+"),
      item.alternates.map((keys) => keys.map(normalize).join("+")).join("|")
    ].join("::");

    if (seen.has(key)) {
      return false;
    }

    seen.add(key);
    return true;
  });
}

function renderStaticControls() {
  elements.deviceFilter.innerHTML = devices
    .map((device) => {
      return `<button type="button" data-device="${device.id}" aria-pressed="false">${device.label}</button>`;
    })
    .join("");

  elements.deviceFilter.addEventListener("click", (event) => {
    const button = event.target.closest("[data-device]");
    if (!button) {
      return;
    }

    state.device = button.dataset.device;
    persist("shortcut-device", state.device);
    render();
  });

  elements.appTabs.addEventListener("click", (event) => {
    const tab = event.target.closest("[data-app]");
    if (!tab) {
      return;
    }

    state.activeApp = tab.dataset.app;
    persist("shortcut-active-app", state.activeApp);
    render();
  });
}

function render() {
  renderDeviceFilter();
  renderKeyboardPreview();

  if (apps.length === 0) {
    return;
  }

  const activeApp = apps.find((app) => app.id === state.activeApp) || apps[0];
  const filtered = getFilteredShortcuts();

  renderTabs();
  renderActiveFilters(activeApp, filtered);
  renderShortcuts(filtered);

  elements.activeAppTitle.textContent = activeApp.label;
  elements.resultCount.textContent = `${filtered.length} ${pluralize(filtered.length, "shortcut")}`;
  elements.librarySummary.textContent = `${shortcuts.length} shortcuts across ${apps.length} apps`;
  elements.clearSearch.classList.toggle("is-visible", state.search.trim().length > 0);
}

function renderLoadError(error) {
  elements.librarySummary.textContent = "Shortcut JSON files could not be loaded";
  elements.activeAppTitle.textContent = "Unable to load shortcuts";
  elements.resultCount.textContent = "Shortcut data is embedded in this file";
  elements.activeFilters.innerHTML = "";
  elements.appTabs.innerHTML = "";
  elements.shortcutList.hidden = true;
  elements.emptyState.hidden = false;
  elements.emptyState.querySelector("h3").textContent = "JSON loading failed";
  elements.emptyState.querySelector("p").textContent =
    "Refresh this file or regenerate it from the source JSON.";
  console.error(error);
}

function renderDeviceFilter() {
  elements.deviceFilter.querySelectorAll("[data-device]").forEach((button) => {
    button.setAttribute("aria-pressed", String(button.dataset.device === state.device));
  });
}

function renderTabs() {
  const query = normalize(state.search);

  elements.appTabs.innerHTML = apps
    .map((app) => {
      const count = shortcuts.filter((item) => {
        return item.app === app.id && matchesDevice(item) && matchesSearch(item, query);
      }).length;

      return `
        <button
          class="app-tab"
          style="--tab-color: ${app.color}"
          type="button"
          role="tab"
          data-app="${app.id}"
          aria-selected="${app.id === state.activeApp}"
        >
          <span class="tab-name">${app.label}</span>
          <span class="tab-count">${count}</span>
        </button>
      `;
    })
    .join("");
}

function renderKeyboardPreview() {
  const keySets = {
    all: ["Ctrl", "Alt", "Cmd", "/", "K"],
    mac: ["Cmd", "Option", "Shift", "Space", "F"],
    windows: ["Win", "Ctrl", "Alt", "Tab", "S"],
    linux: ["Ctrl", "Alt", "Shift", "/", "T"]
  };

  elements.keyboardPreview.innerHTML = keySets[state.device]
    .map((key) => `<span class="preview-key">${escapeHtml(key)}</span>`)
    .join("");
}

function renderActiveFilters(activeApp, filtered) {
  const device = devices.find((item) => item.id === state.device);
  const chips = [
    activeApp.label,
    device ? device.label : "All devices"
  ];

  if (state.search.trim()) {
    chips.push(`Search: ${state.search.trim()}`);
  }

  if (filtered.length === 0) {
    chips.push("No matches");
  }

  elements.activeFilters.innerHTML = chips
    .map((chip) => `<span class="filter-chip">${escapeHtml(chip)}</span>`)
    .join("");
}

function renderShortcuts(items) {
  elements.emptyState.hidden = items.length > 0;
  elements.shortcutList.hidden = items.length === 0;

  if (items.length === 0) {
    elements.shortcutList.innerHTML = "";
    return;
  }

  const groups = groupByCategory(items);
  elements.shortcutList.innerHTML = groups
    .map(([category, groupItems]) => {
      const rows = groupItems.map(renderShortcutRow).join("");
      return `
        <section class="category-group">
          <div class="category-title">
            <span class="category-dot" style="--category-color: ${categoryColors[category] || "#2563eb"}"></span>
            ${escapeHtml(category)}
          </div>
          ${rows}
        </section>
      `;
    })
    .join("");
}

function renderShortcutRow(item) {
  const combo = formatCombo(item.keys);
  const devicesMarkup = item.devices
    .map((device) => {
      return `<span class="device-chip device-${device}">${deviceLabels[device]}</span>`;
    })
    .join("");

  return `
    <article class="shortcut-row">
      <div class="shortcut-main">
        <div class="shortcut-action">${escapeHtml(item.action)}</div>
        <p class="shortcut-description">${escapeHtml(item.description)}</p>
      </div>
      <div class="shortcut-keys" aria-label="${escapeHtml(combo)}">
        ${renderKeyGroup(item.keys)}
        ${renderAlternates(item.alternates)}
      </div>
      <div class="shortcut-meta">
        ${devicesMarkup}
        <span class="category-chip">${escapeHtml(item.category)}</span>
      </div>
    </article>
  `;
}

function renderAlternates(alternates) {
  if (!alternates.length) {
    return "";
  }

  return `
    <div class="shortcut-alternates">
      <span class="alternate-label">Also</span>
      ${alternates.map((keys) => renderKeyGroup(keys, "alternate-key")).join("")}
    </div>
  `;
}

function renderKeyGroup(keys, className = "") {
  const classAttribute = className ? ` class="${className}"` : "";
  return `
    <span${classAttribute}>
      ${keys
        .map((key, index) => {
          const plus = index === 0 ? "" : `<span class="key-plus">+</span>`;
          return `${plus}<kbd>${escapeHtml(key)}</kbd>`;
        })
        .join("")}
    </span>
  `;
}

function getFilteredShortcuts() {
  const query = normalize(state.search);
  return shortcuts.filter((item) => {
    return item.app === state.activeApp && matchesDevice(item) && matchesSearch(item, query);
  });
}

function matchesDevice(item) {
  return state.device === "all" || item.devices.includes(state.device);
}

function matchesSearch(item, query) {
  if (!query) {
    return true;
  }

  const appLabel = apps.find((app) => app.id === item.app)?.label || "";
  const haystack = normalize([
    appLabel,
    item.category,
    item.action,
    item.description,
    getAllCombos(item).join(" "),
    item.tags.join(" ")
  ].join(" "));

  return query.split(" ").every((part) => haystack.includes(part));
}

function getAllCombos(item) {
  return [item.keys, ...item.alternates].map(formatCombo);
}

function formatCombo(keys) {
  return keys.join(" + ");
}

function groupByCategory(items) {
  const groups = new Map();
  items.forEach((item) => {
    if (!groups.has(item.category)) {
      groups.set(item.category, []);
    }
    groups.get(item.category).push(item);
  });
  return [...groups.entries()];
}

function normalize(value) {
  return value.toLowerCase().trim().replace(/\s+/g, " ");
}

function pluralize(count, word) {
  return count === 1 ? word : `${word}s`;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function pickDefaultApp() {
  const platform = navigator.userAgentData?.platform || navigator.platform || "";
  const normalizedPlatform = platform.toLowerCase();

  if (normalizedPlatform.includes("mac")) {
    return "macos";
  }

  if (normalizedPlatform.includes("win")) {
    return "windows11";
  }

  return "sheets";
}

function persist(key, value) {
  try {
    localStorage.setItem(key, value);
  } catch {
    return;
  }
}

function restore(key) {
  try {
    return localStorage.getItem(key);
  } catch {
    return null;
  }
}
